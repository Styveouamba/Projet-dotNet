services:
  postgres:
    image: postgres:15
    container_name: gestionproduits_postgres
    environment:
      POSTGRES_DB: gestionproduits
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
